<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Generador de Test Interactivo</title>

<link rel="stylesheet" href="estilos.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/mammoth@1.7.0/mammoth.browser.min.js"></script>

</head>

<body>

<header>

<h1>🎓 Generador de Test Interactivo</h1>

<p>Plantilla reutilizable para crear evaluaciones</p>

</header>

<div class="contenedor">

<section class="panel">

<h2>Configuración del Test</h2>

<label for="titulo">Título</label>

<input id="titulo" placeholder="Ej.: Evaluación de Liderazgo">

<label for="curso">Curso</label>

<input id="curso" placeholder="Gestión de Personas">

<label for="tiempo">Tiempo (minutos)</label>

<input type="number" id="tiempo" value="30" min="1">

<label>

<input type="checkbox" id="aleatorio">

Orden aleatorio

</label>

<label>

<input type="checkbox" id="retro">

Mostrar retroalimentación

</label>

<button onclick="crearPregunta()">

➕ Agregar Pregunta

</button>

<button onclick="guardarJSON()">

💾 Guardar Banco

</button>

<button onclick="cargarJSON()">

📂 Cargar Banco

</button>

<button onclick="importarDesdeWord()">

📝 Importar desde Word

</button>

<button class="rojo" onclick="limpiarTodo()">

🗑️ Limpiar Todo

</button>

<input type="file" id="archivoJSON" accept=".json,application/json" hidden>

<input type="file" id="archivoWord" accept=".docx" hidden>

</section>

<section>

<h2>Preguntas</h2>

<div id="listaPreguntas" aria-live="polite"></div>

</section>

<section class="acciones">

<button class="verde" onclick="previsualizar()">

▶ Previsualizar Test

</button>

<button class="azul" onclick="generarTest()">

🚀 Generar Test

</button>

</section>

</div>

<div id="modal" class="modal">

<div class="modal-contenido">

<span class="cerrar" onclick="cerrarModal()">

×

</span>

<div id="vistaPrevia"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
